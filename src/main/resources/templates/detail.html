<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Chi Tiet Sinh Vien</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            background-color: #f9f9f9;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
        }

        .container {
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            max-width: 500px;
        }

        .detail-group {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }

        .detail-group:last-child {
            border-bottom: none;
        }

        .detail-label {
            font-weight: bold;
            color: #666;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .detail-value {
            color: #333;
            font-size: 18px;
            margin-top: 8px;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 30px;
            justify-content: flex-start;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
            display: inline-block;
            transition: background-color 0.3s;
        }

        .btn-edit {
            background-color: #FF9800;
            color: white;
        }

        .btn-edit:hover {
            background-color: #e68900;
        }

        .btn-delete {
            background-color: #f44336;
            color: white;
        }

        .btn-delete:hover {
            background-color: #da190b;
        }

        .btn-back {
            background-color: #008CBA;
            color: white;
        }

        .btn-back:hover {
            background-color: #007399;
        }

        .delete-form {
            display: inline;
        }
    </style>
</head>

<body>
    <h1>Chi Tiet Sinh Vien</h1>

    <div class="container">
        <div class="detail-group">
            <div class="detail-label">ID Sinh Vien</div>
            <div class="detail-value" th:text="${student.id}">ID</div>
        </div>

        <div class="detail-group">
            <div class="detail-label">Ho va Ten</div>
            <div class="detail-value" th:text="${student.name}">Tên</div>
        </div>

        <div class="detail-group">
            <div class="detail-label">Email</div>
            <div class="detail-value" th:text="${student.email}">Email</div>
        </div>

        <div class="detail-group">
            <div class="detail-label">Tuoi</div>
            <div class="detail-value" th:text="${student.age}">0</div>
        </div>

        <div class="action-buttons">
            <a th:href="@{/students/{id}/edit(id=${student.id})}" class="btn btn-edit">Chinh Sua</a>
            
            <form th:action="@{/students/{id}/delete(id=${student.id})}" method="POST" class="delete-form" onsubmit="return confirm('Ban chac chan muon xoa sinh vien nay?');">
                <button type="submit" class="btn btn-delete">Xoa</button>
            </form>

            <a href="/students" class="btn btn-back">Quay Lai</a>
        </div>
    </div>
</body>

</html>
