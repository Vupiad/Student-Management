<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title th:text="${isEdit} ? 'Chinh Sua Sinh Vien' : 'Them Sinh Vien Moi'">Form</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            background-color: #f9f9f9;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
        }

        .form-container {
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            max-width: 500px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input[type="text"],
        input[type="email"],
        input[type="number"] {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="number"]:focus {
            outline: none;
            border-color: #4CAF50;
            box-shadow: 0 0 5px rgba(76, 175, 80, 0.3);
        }

        .form-buttons {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        button,
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
            display: inline-block;
            transition: background-color 0.3s;
            flex: 1;
            text-align: center;
        }

        .btn-submit {
            background-color: #4CAF50;
            color: white;
        }

        .btn-submit:hover {
            background-color: #45a049;
        }

        .btn-cancel {
            background-color: #888;
            color: white;
            text-decoration: none;
        }

        .btn-cancel:hover {
            background-color: #666;
        }

        .id-field {
            display: none;
        }

        .error {
            color: #f44336;
            font-size: 12px;
            margin-top: 5px;
        }

        .readonly-field {
            background-color: #f5f5f5;
            cursor: not-allowed;
        }

        .help-text {
            color: #999;
            font-size: 12px;
            margin-top: 5px;
        }
    </style>
</head>

<body>
    <h1 th:text="${isEdit} ? 'Chinh Sua Sinh Vien' : 'Them Sinh Vien Moi'">Form</h1>

    <div class="form-container">
        <form th:action="${isEdit} ? @{/students/{id}(id=${student.id})} : @{/students}" method="POST">
            <!-- ID field (only visible and disabled for edit) -->
            <div class="form-group" th:if="${isEdit}">
                <label for="id">ID Sinh Vien</label>
                <input type="text" id="id" name="id" th:value="${student.id}" readonly class="readonly-field" />
                <div class="help-text">ID khong the chinh sua</div>
            </div>

            <!-- ID field (required for create) -->
            <div class="form-group" th:if="!${isEdit}">
                <label for="id">ID Sinh Vien <span style="color: red;">*</span></label>
                <input type="text" id="id" name="id" required placeholder="Nhap ID sinh vien" />
            </div>

            <!-- Name field -->
            <div class="form-group">
                <label for="name">Ho va Ten <span style="color: red;">*</span></label>
                <input type="text" id="name" name="name" th:value="${student.name}" required placeholder="Nhap ho va ten" />
            </div>

            <!-- Email field -->
            <div class="form-group">
                <label for="email">Email <span style="color: red;">*</span></label>
                <input type="email" id="email" name="email" th:value="${student.email}" required placeholder="Nhap Email" />
            </div>

            <!-- Age field -->
            <div class="form-group">
                <label for="age">Tuoi <span style="color: red;">*</span></label>
                <input type="number" id="age" name="age" th:value="${student.age}" required min="1" max="150" placeholder="Nhap tuoi" />
            </div>

            <!-- Buttons -->
            <div class="form-buttons">
                <button type="submit" class="btn-submit" th:text="${isEdit} ? 'Cap Nhat' : 'Them Moi'">Submit</button>
                <a href="/students" class="btn btn-cancel">Huy</a>
            </div>
        </form>
    </div>
</body>

</html>
